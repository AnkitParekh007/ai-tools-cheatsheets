{% extends "layout.html" %}

{% block head %}
    {{ super() }}
    <meta name="HandheldFriendly" content="true"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI Tools Cheatsheets">
    <meta name="application-name" content="AI Tools Cheatsheets">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#071119">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f3f8fc">
    <meta name="msapplication-TileColor" content="#071119">
    <meta name="msapplication-config" content="{{ "assets/images/browserconfig.xml"|resolveFile }}">
    <link rel="icon" type="image/svg+xml" href="{{ "assets/images/favicon.svg"|resolveFile }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ "assets/images/favicon-16x16.png"|resolveFile }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ "assets/images/favicon-32x32.png"|resolveFile }}">
    <link rel="icon" type="image/png" sizes="48x48" href="{{ "assets/images/favicon-48x48.png"|resolveFile }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ "assets/images/apple-touch-icon.png"|resolveFile }}">
    <link rel="mask-icon" href="{{ "assets/images/safari-pinned-tab.svg"|resolveFile }}" color="#49b8ff">
    <link rel="manifest" href="{{ "assets/images/site.webmanifest"|resolveFile }}">
    <link rel="shortcut icon" href="{{ "assets/images/favicon.ico"|resolveFile }}" type="image/x-icon">
{% endblock %}

{% block style %}
    <link rel="stylesheet" href="{{ "style.css"|resolveAsset }}">

    {{ super() }}

    {% for type, style in config.styles %}
        {% if fileExists(style) and type == "website" %}
        <link rel="stylesheet" href="{{ style|resolveFile }}">
        {% endif %}
    {% endfor %}
{% endblock %}

{% block body %}{% endblock %}
