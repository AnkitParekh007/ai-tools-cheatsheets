name: Command verification
description: Verify or correct a CLI command from official docs
title: "[Command Verification] "
labels: ["documentation", "verification", "good first issue"]
body:
  - type: input
    id: file
    attributes:
      label: Affected file
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Official source link
    validations:
      required: true
  - type: textarea
    id: current_command
    attributes:
      label: Current command
    validations:
      required: true
  - type: textarea
    id: expected_change
    attributes:
      label: Expected command or note
    validations:
      required: true
  - type: dropdown
    id: verification_status
    attributes:
      label: Verification status
      options:
        - Confirmed from official docs
        - Needs verification
        - Experimental / preview
    validations:
      required: true
  - type: dropdown
    id: pr_willingness
    attributes:
      label: Willing to submit a PR?
      options:
        - Yes
        - No
    validations:
      required: true
