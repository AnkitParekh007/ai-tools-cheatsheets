name: MCP server submission
description: Add or improve an MCP server page
title: "[MCP] "
labels: ["documentation", "mcp", "help wanted"]
body:
  - type: input
    id: file
    attributes:
      label: Affected file
      description: Example `docs/mcp/github-mcp.md`
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Official or source link
    validations:
      required: true
  - type: textarea
    id: permissions
    attributes:
      label: Permissions required
    validations:
      required: true
  - type: textarea
    id: expected_change
    attributes:
      label: Expected change
    validations:
      required: true
  - type: dropdown
    id: verification_status
    attributes:
      label: Verification status
      options:
        - Confirmed
        - Needs verification
        - Experimental / preview
    validations:
      required: true
  - type: dropdown
    id: pr_willingness
    attributes:
      label: Willing to submit a PR?
      options:
        - Yes
        - No
    validations:
      required: true
