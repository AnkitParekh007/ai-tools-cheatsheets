name: New tool coverage
description: Request a new AI coding tool page or a major expansion of an existing one.
title: "[Tool]: "
labels:
  - tool
  - documentation
body:
  - type: input
    id: tool_name
    attributes:
      label: Tool or model name
      placeholder: ExampleTool CLI
    validations:
      required: true
  - type: input
    id: official_docs
    attributes:
      label: Official docs or repository
      placeholder: https://example.com/docs
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why this tool belongs here
      description: Explain the engineering use case, host surface, or team relevance.
    validations:
      required: true
  - type: textarea
    id: install_or_config
    attributes:
      label: Known installation or configuration notes
      description: Paste official commands, supported hosts, or platform notes if available.
  - type: dropdown
    id: verification
    attributes:
      label: Verification performed
      options:
        - Official docs reviewed
        - Installed locally
        - Account-gated research only
        - No verification yet
    validations:
      required: true
  - type: dropdown
    id: contribution
    attributes:
      label: Will you contribute content?
      options:
        - Yes
        - Maybe
        - No
    validations:
      required: true
