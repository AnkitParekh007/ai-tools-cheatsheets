name: Tool update
description: Request an update to an existing tool page
title: "[Tool Update] "
labels: ["documentation", "tool-update", "verification"]
body:
  - type: input
    id: tool_name
    attributes:
      label: Tool name
      description: Which tool page needs an update?
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Official source link
      description: Link to the official documentation or release note
    validations:
      required: true
  - type: input
    id: file
    attributes:
      label: Affected file
      description: Example `docs/tools/openai-codex.md`
    validations:
      required: true
  - type: textarea
    id: expected_change
    attributes:
      label: Expected change
      description: What should be updated?
    validations:
      required: true
  - type: dropdown
    id: verification_status
    attributes:
      label: Verification status
      options:
        - Confirmed from official docs
        - Needs verification
        - Experimental / preview
    validations:
      required: true
  - type: dropdown
    id: pr_willingness
    attributes:
      label: Willing to submit a PR?
      options:
        - Yes
        - No
    validations:
      required: true
