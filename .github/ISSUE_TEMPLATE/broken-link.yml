name: Broken link
description: Report an internal or external documentation link that is broken, stale, or misdirected.
title: "[Broken Link]: "
labels:
  - broken-link
  - documentation
body:
  - type: input
    id: page
    attributes:
      label: Affected page
      description: Source page path or public URL where you found the broken link.
      placeholder: docs/getting-started/quick-start.md
    validations:
      required: true
  - type: input
    id: link
    attributes:
      label: Broken link target
      description: Paste the broken URL, path, or anchor target.
      placeholder: https://example.com/docs
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: What is broken
      description: Explain the failure mode.
      placeholder: Returns 404, redirects to the wrong page, or anchor no longer exists.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected destination
      description: If you know the correct target, paste it here.
  - type: dropdown
    id: verified
    attributes:
      label: Verification performed
      options:
        - I reproduced the broken link locally or on the public site
        - I only noticed the issue while reading
        - I have a fix ready
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Add browser, platform, screenshots, or related pages if useful.
